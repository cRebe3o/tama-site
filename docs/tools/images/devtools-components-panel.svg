  <text x="78" y="200" font-size="12" fill="#c58af9">VDialog</text>
  <text x="94" y="220" font-size="12" fill="#c58af9">VCard</text>

  <!-- callout 1: tree -->
  <circle cx="310" cy="56" r="9" fill="#42b883"/>
