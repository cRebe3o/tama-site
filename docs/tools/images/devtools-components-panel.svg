    <text x="346" y="160" fill="#8ab4f8">editedItem</text>
    <text x="440" y="160" fill="#9aa0a6">Object</text>
    <text x="360" y="182" fill="#8ab4f8">name:</text>
    <text x="420" y="182" fill="#f28b82">""</text>
    <text x="360" y="202" fill="#8ab4f8">email:</text>
    <text x="420" y="202" fill="#f28b82">""</text>
  </g>

  <!-- callout 4: edit icon -->
  <circle cx="700" cy="132" r="9" fill="#42b883" opacity="0"/>
  <circle cx="726" cy="132" r="9" fill="#42b883"/>
  <text x="726" y="136" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="bold">4</text>

  <line x1="346" y1="230" x2="884" y2="230" stroke="#3c4043"/>
  <text x="346" y="252" font-size="12" fill="#e8eaed" font-weight="bold">Setup</text>
  <text x="346" y="276" font-size="12" fill="#c58af9">fetchAll</text>
  <text x="420" y="276" font-size="11" fill="#5f6368">ƒ (function)</text>
