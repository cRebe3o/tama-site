  <text x="30" y="76" font-size="12" fill="#c58af9">AppShell</text>
  <text x="46" y="96" font-size="12" fill="#c58af9">NavigationDrawer</text>
  <text x="46" y="116" font-size="12" fill="#c58af9">RouterView</text>

  <!-- selected row highlight -->
  <rect x="0" y="126" width="330" height="20" fill="#31415e"/>
  <rect x="0" y="126" width="3" height="20" fill="#42b883"/>
  <text x="62" y="140" font-size="12" fill="#8ab4f8" font-weight="bold">CustomersPage</text>

  <text x="78" y="160" font-size="12" fill="#c58af9">VDataTableServer</text>
