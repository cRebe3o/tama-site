  <text x="20" y="21" font-size="10" fill="#42b883" text-anchor="middle">⌖</text>
  <rect x="40" y="7" width="200" height="20" rx="4" fill="#171717" stroke="#3c4043"/>
  <text x="48" y="21" font-size="11" fill="#9aa0a6">Filter components...</text>
  <circle cx="880" cy="17" r="9" fill="#171717" stroke="#3c4043"/>
