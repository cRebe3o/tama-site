  <!-- callout 2: selected -->
  <circle cx="310" cy="136" r="9" fill="#42b883"/>
  <text x="310" y="140" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="bold">2</text>

  <!-- right inspector -->
  <rect x="330" y="34" width="570" height="506" fill="#232326" stroke="#3c4043"/>
  <text x="346" y="58" font-size="13" fill="#e8eaed" font-weight="bold">&lt;CustomersPage&gt;</text>

  <!-- tabs -->
  <text x="346" y="82" font-size="11" fill="#9aa0a6">Props</text>
  <text x="400" y="82" font-size="11" fill="#42b883" font-weight="bold">State</text>
  <rect x="398" y="86" width="34" height="2" fill="#42b883"/>
  <text x="446" y="82" font-size="11" fill="#9aa0a6">Setup</text>
  <text x="496" y="82" font-size="11" fill="#9aa0a6">Emits</text>

  <!-- callout 3: state tab -->
  <circle cx="530" cy="78" r="9" fill="#42b883"/>
  <text x="530" y="82" font-size="11" fill="#0b0b0b" text-anchor="middle" font-weight="bold">3</text>

  <!-- state rows -->
  <g font-size="12">
    <text x="346" y="112" fill="#8ab4f8">search</text>
    <text x="420" y="112" fill="#f28b82">""</text>

    <text x="346" y="136" fill="#8ab4f8">dialog</text>
    <text x="420" y="136" fill="#ffb04c">false</text>
    <circle cx="700" cy="132" r="8" fill="none" stroke="#9aa0a6"/>
